collection:
  - https://iiif.michelchiha.org/collection
metadata:
  - date
  - contributor
  - tags
  - language
  - type
featured:
  - https://iiif.michelchiha.org/01/manifest
  - https://iiif.michelchiha.org/02/manifest
search:
  results:
    work:
      layout: grid
      result: figure
    page:
      layout: list
      result: article
  index:
    metadata:
      enabled: true
      all: false
    summary:
      enabled: true
    annotations:
      enabled: true
      motivation:
        - commenting
        - tagging
theme:
  appearance: light
  accentColor: red
  grayColor: slate
locales:
  - lang: en
    label: English
    default: true
  - lang: fr
    label: Français
  - lang: ar
    label: العربية  


